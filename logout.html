<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logging Out | FOODO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --vibrant-orange: #FF5F00;
            --vibrant-pink: #FF007A;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #000;
            color: #fff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        h1, .syne { font-family: 'Syne', sans-serif; }

        .grid-bg {
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 40px 40px;
            position: absolute;
            inset: 0;
            inset: 0;
        }

        .exit-card {
            animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            perspective: 1000px;
            z-index: 10;
        }

        @keyframes cardEntrance {
            0% { opacity: 0; transform: scale(0.8) rotateX(-20deg) translateY(50px); }
            100% { opacity: 1; transform: scale(1) rotateX(0deg) translateY(0); }
        }

        .loader-bar {
            width: 0%;
            height: 4px;
            background: linear-gradient(to right, var(--vibrant-orange), var(--vibrant-pink));
            border-radius: 10px;
            animation: loadProgress 3s linear forwards;
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .floating-icon {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(12deg); }
            50% { transform: translateY(-15px) rotate(15deg); }
        }

        .gradient-text {
            background: linear-gradient(to right, var(--vibrant-orange), var(--vibrant-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="grid-bg">

    <div class="exit-card relative w-full max-w-lg px-6">
        <div class="bg-zinc-900 border-4 border-white/10 rounded-[4rem] p-12 text-center shadow-2xl relative overflow-hidden">
            <div class="absolute -top-20 -right-20 w-64 h-64 bg-orange-600/10 blur-[80px] rounded-full"></div>
            
            <div class="mb-10 flex justify-center">
                <div class="floating-icon bg-white text-black w-24 h-24 rounded-[2.5rem] flex items-center justify-center shadow-2xl">
                    <i data-lucide="power" class="w-10 h-10"></i>
                </div>
            </div>

            <h1 class="syne text-5xl font-black italic tracking-tighter mb-4 uppercase">
                CRAVE YOU <br><span class="gradient-text">LATER!</span>
            </h1>
            <p class="text-slate-500 font-bold tracking-[0.3em] text-[10px] uppercase mb-10">
                Securely closing your session...
            </p>

            <div class="max-w-[200px] mx-auto mb-10">
                <div class="w-full bg-white/5 rounded-full h-1 overflow-hidden">
                    <div class="loader-bar"></div>
                </div>
            </div>

            <button onclick="window.location.href='signup.html'" class="text-[10px] font-black uppercase tracking-[0.4em] text-white/30 hover:text-orange-500 transition-colors">
                Immediate Return →
            </button>
        </div>

        <div class="mt-8 text-center">
            <p class="syne italic text-white/10 text-xl font-bold uppercase tracking-tighter">
                Bold • Fast • Fresh • FOODO
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();
        setTimeout(() => {
            document.body.style.transition = 'opacity 0.5s ease';
            document.body.style.opacity = '0';
            setTimeout(() => {
                window.location.href = 'signup.html';
            }, 500);
        }, 3000);
    </script>
</body>
</html>
