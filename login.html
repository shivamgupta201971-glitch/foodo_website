<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOODO | Premium Food Platform</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #070b14;
            color: white;
            overflow: hidden;
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Animated Background Gradients */
        .bg-glow {
            position: absolute;
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.1) 0%, rgba(7, 11, 20, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(80px);
            animation: moveGlow 20s infinite alternate ease-in-out;
        }

        @keyframes moveGlow {
            0% { transform: translate(-20%, -20%); }
            100% { transform: translate(20%, 20%); }
        }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform-style: preserve-3d;
        }

        /* Moving Images (Floating) */
        .flying-food {
            position: absolute;
            width: 120px;
            height: 120px;
            pointer-events: auto;
            cursor: pointer;
            z-index: 5;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
        }
        .flying-food:hover {
            transform: scale(1.2) rotate(10deg);
        }
        .flying-food:active {
            transform: scale(0.9);
        }

        @keyframes float-around {
            0% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -50px) rotate(5deg); }
            66% { transform: translate(-20px, 20px) rotate(-5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* Drag Slider Styling */
        .slider-container {
            width: 100%;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            position: relative;
            padding: 5px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .slider-handle {
            width: 50px;
            height: 50px;
            background: #f97316;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            position: absolute;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.4);
            transition: background 0.3s;
        }
        .slider-handle:active { cursor: grabbing; }

        .slider-text {
            position: absolute;
            width: 100%;
            text-align: center;
            line-height: 50px;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.3);
            pointer-events: none;
            user-select: none;
        }

        /* Animated Gradient Text */
        .text-gradient {
            background: linear-gradient(90deg, #f97316, #fb923c, #f97316);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* Countdown Timer Style */
        .timer-badge {
            background: rgba(249, 115, 22, 0.15);
            border: 1px solid rgba(249, 115, 22, 0.3);
            color: #f97316;
            padding: 8px 16px;
            border-radius: 99px;
            font-weight: 800;
            font-size: 1.2rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2rem;
            animation: pulse-timer 1s infinite;
        }

        @keyframes pulse-timer {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 20px 0 rgba(249, 115, 22, 0.2); }
        }

        /* Cooking Animation */
        @keyframes steam {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-30px) scale(1.8); opacity: 0; }
        }
        .steam-icon { animation: steam 2s infinite; }
        
        @keyframes pot-shake {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }
        .pot-anim { animation: pot-shake 0.5s infinite ease-in-out; }

        .hidden-view { display: none; opacity: 0; }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>

<body>

    <div class="bg-glow"></div>

    <!-- Moving Clickable Images -->
    <img src="https://api.iconify.design/noto:pizza.svg" class="flying-food top-[15%] left-[10%]" style="animation: float-around 10s infinite ease-in-out" onclick="this.style.display='none'">
    <img src="https://api.iconify.design/noto:hamburger.svg" class="flying-food top-[25%] right-[10%]" style="animation: float-around 12s infinite ease-in-out 1s" onclick="this.style.display='none'">
    <img src="https://api.iconify.design/noto:sushi.svg" class="flying-food bottom-[20%] left-[15%]" style="animation: float-around 8s infinite ease-in-out 0.5s" onclick="this.style.display='none'">

    <!-- ================= SIGNUP VIEW ================= -->
    <section id="signup-view" class="w-full max-w-md z-10 transition-all duration-700">
        <div class="glass p-10 rounded-[3rem] relative text-center">
            
            <div class="inline-block bg-orange-500/20 p-4 rounded-3xl mb-6 border border-orange-500/30">
                <i data-lucide="utensils" class="text-orange-500 w-10 h-10"></i>
            </div>
            
            <h2 class="text-4xl font-extrabold tracking-tight mb-2">
                Join <span class="text-gradient">FOODO.</span>
            </h2>
            <p class="text-slate-400 text-sm mb-8">Set up your profile to start cooking!</p>

            <form id="signupForm" class="space-y-4">
                <div class="grid grid-cols-2 gap-4 text-left">
                    <input id="first" placeholder="First Name" required
                        class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 focus:border-orange-500 outline-none transition-all placeholder:text-slate-600 text-sm">
                    <input id="last" placeholder="Last Name" required
                        class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 focus:border-orange-500 outline-none transition-all placeholder:text-slate-600 text-sm">
                </div>

                <div class="grid grid-cols-2 gap-4 text-left">
                    <input id="username" placeholder="Username" required
                        class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 focus:border-orange-500 outline-none transition-all placeholder:text-slate-600 text-sm">
                    <input id="phone" type="tel" placeholder="Phone Number" required
                        class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 focus:border-orange-500 outline-none transition-all placeholder:text-slate-600 text-sm">
                </div>

                <input id="password" type="password" minlength="5" placeholder="Password (min. 5 chars)" required
                    class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 focus:border-orange-500 outline-none transition-all placeholder:text-slate-600 text-sm">

                <!-- Drag to Signup Slider -->
                <div class="pt-4">
                    <div class="slider-container" id="sliderTrack">
                        <div class="slider-text">Slide to Create Kitchen</div>
                        <div class="slider-handle" id="sliderHandle">
                            <i data-lucide="chevron-right" class="text-white w-6 h-6"></i>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </section>

    <!-- ================= LOADING VIEW ================= -->
    <section id="loading-view" class="hidden-view flex flex-col items-center justify-center z-10">
        <!-- Countdown Timer Badge -->
        <div class="timer-badge">
            <i data-lucide="clock" class="w-5 h-5"></i>
            <span id="countdownNumber">5</span>s
        </div>

        <div class="relative">
            <i data-lucide="wind" class="steam-icon absolute -top-12 left-0 text-white/30 w-8 h-8"></i>
            <i data-lucide="wind" class="steam-icon absolute -top-16 left-10 text-white/20 w-10 h-10" style="animation-delay: 0.4s"></i>
            
            <div class="pot-anim bg-gradient-to-br from-orange-500 to-orange-700 p-12 rounded-[2.5rem] shadow-2xl shadow-orange-500/40">
                <i data-lucide="cooking-pot" class="w-24 h-24 text-white"></i>
            </div>
        </div>

        <div class="mt-12 text-center">
            <h2 class="text-3xl font-black italic mb-3 tracking-tight text-gradient">Cooking...</h2>
            <p id="loadingText" class="text-orange-400 font-bold uppercase tracking-[0.3em] text-[10px]">
                PREPARING THE FEAST
            </p>
        </div>

        <div class="w-64 h-1.5 bg-white/5 rounded-full mt-10 overflow-hidden">
            <div id="progress" class="h-full bg-orange-500 w-0 transition-all duration-500"></div>
        </div>
    </section>

    <script>
        lucide.createIcons();

        // Slider Logic
        const handle = document.getElementById('sliderHandle');
        const track = document.getElementById('sliderTrack');
        const form = document.getElementById('signupForm');
        let isDragging = false;
        let startX = 0;

        handle.addEventListener('mousedown', (e) => startDrag(e.clientX));
        handle.addEventListener('touchstart', (e) => startDrag(e.touches[0].clientX));

        function startDrag(clientX) {
            // Check form validity before allowing slide
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }
            isDragging = true;
            startX = clientX;
            handle.style.transition = 'none';
        }

        window.addEventListener('mousemove', (e) => drag(e.clientX));
        window.addEventListener('touchmove', (e) => drag(e.touches[0].clientX));

        function drag(clientX) {
            if (!isDragging) return;
            const trackRect = track.getBoundingClientRect();
            const maxDelta = trackRect.width - 60; // handle width + padding
            let delta = clientX - startX;
            
            delta = Math.max(0, Math.min(delta, maxDelta));
            handle.style.left = delta + 5 + 'px';

            if (delta >= maxDelta - 2) {
                completeSlider();
            }
        }

        window.addEventListener('mouseup', endDrag);
        window.addEventListener('touchend', endDrag);

        function endDrag() {
            if (!isDragging) return;
            isDragging = false;
            if (parseInt(handle.style.left) < track.clientWidth - 70) {
                handle.style.transition = 'left 0.3s ease-out';
                handle.style.left = '5px';
            }
        }

        function completeSlider() {
            isDragging = false;
            handle.style.background = '#22c55e'; // Green for success
            
            // Collect User Data
            const user = {
                first: document.getElementById("first").value,
                last: document.getElementById("last").value,
                username: document.getElementById("username").value,
                phone: document.getElementById("phone").value,
                password: document.getElementById("password").value
            };
            localStorage.setItem("foodoUser", JSON.stringify(user));
            
            // Trigger Loading
            startLoadingProcess();
        }

        function startLoadingProcess() {
            const signup = document.getElementById("signup-view");
            const loading = document.getElementById("loading-view");

            signup.style.opacity = "0";
            signup.style.transform = "scale(0.9) translateY(20px)";

            setTimeout(() => {
                signup.style.display = "none";
                loading.style.display = "flex";
                setTimeout(() => { loading.style.opacity = "1"; }, 50);
                runTimer();
            }, 600);
        }

        function runTimer() {
            let timeLeft = 5;
            const text = document.getElementById("loadingText");
            const progress = document.getElementById("progress");
            const countdownNumber = document.getElementById("countdownNumber");
            const statuses = ["Whisking...", "Baking...", "Sizzling...", "Plating...", "Done!"];

            const interval = setInterval(() => {
                timeLeft--;
                if (timeLeft >= 0) {
                    text.innerText = statuses[4 - timeLeft] || statuses[4];
                    progress.style.width = ((5 - timeLeft) / 5 * 100) + "%";
                    countdownNumber.innerText = timeLeft;
                }
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    // Fade out body before redirect
                    document.body.style.opacity = '0';
                    document.body.style.transition = 'opacity 0.5s ease';
                    setTimeout(() => {
                        window.location.href = "home.html";
                    }, 500);
                }
            }, 1000);
        }
    </script>
</body>
</html>
