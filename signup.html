<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodo | Join the Taste Revolution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:italic,wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f97316;
            --primary-dark: #ea580c;
            --accent: #fbbf24;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0c0a09;
            color: #fafaf9;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.15) 0%, rgba(251, 191, 36, 0.1) 100%);
            filter: blur(100px);
            border-radius: 50%;
            z-index: -1;
            animation: move 25s infinite alternate ease-in-out;
        }

        .grid-pattern {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(249, 115, 22, 0.08) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), black, transparent 80%);
            pointer-events: none;
            z-index: 0;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%) scale(1); }
            to { transform: translate(30%, 30%) scale(1.1); }
        }

        .glass-card {
            background: rgba(28, 25, 23, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(250, 250, 249, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-field {
            background: rgba(12, 10, 9, 0.4);
            border: 1px solid rgba(250, 250, 249, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-field:focus {
            border-color: var(--primary);
            background: rgba(12, 10, 9, 0.7);
            box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1);
        }

        .timer-circle {
            transition: stroke-dashoffset 1s linear;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .quote-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
        }

        .floating-emoji {
            position: absolute;
            pointer-events: none;
            font-size: 2rem;
            z-index: 1;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
            animation: float 6s infinite ease-in-out;
            display: none;
        }
        
        @media (min-width: 768px) {
            .floating-emoji { display: block; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="p-4 md:p-6 relative">
    
    <div class="grid-pattern" id="spotlight"></div>
    <div class="blob" style="top: -10%; left: -10%;"></div>
    <div class="blob" style="bottom: -10%; right: -10%; animation-delay: -7s;"></div>

    <!-- Decorative Elements -->
    <div class="floating-emoji" style="top: 15%; left: 10%;">🍕</div>
    <div class="floating-emoji" style="top: 75%; left: 15%; animation-delay: -2s;">🍔</div>
    <div class="floating-emoji" style="top: 20%; right: 12%; animation-delay: -4s;">🍣</div>
    <div class="floating-emoji" style="bottom: 20%; right: 10%; animation-delay: -1s;">🌮</div>

    <div class="glass-card w-full max-w-[520px] p-6 md:p-12 rounded-3xl md:rounded-[2.5rem] relative z-10 overflow-hidden" id="mainContainer">
        
        <!-- Timer View (Hidden Initially) -->
        <div id="timerView" class="hidden flex flex-col items-center justify-center text-center py-6 fade-in">
            <div class="relative w-28 h-28 md:w-32 md:h-32 mb-8">
                <svg class="w-full h-full" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" stroke="rgba(255,255,255,0.05)" stroke-width="6" fill="transparent" />
                    <circle id="timerCircle" cx="50" cy="50" r="45" stroke="#f97316" stroke-width="6" fill="transparent" 
                        stroke-dasharray="282.7" stroke-dashoffset="0" class="timer-circle" />
                </svg>
                <div id="timerNumber" class="absolute inset-0 flex items-center justify-center text-3xl md:text-4xl font-black text-white">5</div>
            </div>
            
            <div class="space-y-4 max-w-sm">
                <p id="quoteDisplay" class="quote-text text-xl md:text-2xl text-stone-200 leading-relaxed px-4 italic font-serif">"First we eat, then we do everything else."</p>
                <div class="flex flex-col items-center gap-2">
                    <div class="flex space-x-1">
                        <div class="w-1.5 h-1.5 bg-orange-500 rounded-full animate-bounce"></div>
                        <div class="w-1.5 h-1.5 bg-orange-500 rounded-full animate-bounce [animation-delay:0.2s]"></div>
                        <div class="w-1.5 h-1.5 bg-orange-500 rounded-full animate-bounce [animation-delay:0.4s]"></div>
                    </div>
                    <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-orange-500">Preparing your experience...</p>
                </div>
            </div>
        </div>

        <!-- Initial Form View -->
        <div id="formView">
            <header class="text-center mb-8 md:mb-10">
                <div class="inline-flex items-center justify-center w-14 h-14 md:w-16 md:h-16 rounded-2xl bg-orange-500/10 border border-orange-500/20 mb-4 md:mb-6">
                    <svg class="w-7 h-7 md:w-8 md:h-8 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                    </svg>
                </div>
                <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-white mb-2">Create Account</h1>
                <p class="text-stone-400 text-xs md:text-sm">Join the world's most elite food community</p>
            </header>

            <form id="signupForm" class="space-y-4 md:space-y-5">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-stone-500 ml-1">First Name</label>
                        <input type="text" id="firstname" required class="input-field w-full px-4 md:px-5 py-3 rounded-xl text-stone-200 outline-none text-sm" placeholder="John">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-stone-500 ml-1">Last Name</label>
                        <input type="text" id="lastname" required class="input-field w-full px-4 md:px-5 py-3 rounded-xl text-stone-200 outline-none text-sm" placeholder="Doe">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <div class="flex justify-between items-center px-1">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-stone-500">Foodo Username</label>
                    </div>
                    <div class="relative">
                        <input type="text" id="username" required class="input-field w-full pl-4 md:pl-5 pr-24 md:pr-28 py-3 rounded-xl text-stone-200 outline-none text-sm" placeholder="chef_john">
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-stone-600 text-[10px] md:text-xs font-bold">@foodo.com</span>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-stone-500 ml-1">Pin (5 Digits)</label>
                    <input type="password" id="password" required maxlength="5" pattern="\d{5}" class="input-field w-full px-4 md:px-5 py-3 rounded-xl text-stone-200 outline-none text-sm" placeholder="•••••">
                </div>

                <div id="error-box" class="hidden p-3 bg-red-500/10 border border-red-500/20 text-red-400 text-[10px] font-bold rounded-xl">
                    <span id="error-message"></span>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-black py-4 rounded-xl transition-all shadow-lg shadow-orange-600/20 active:scale-[0.98] flex items-center justify-center mt-2 group">
                    <span id="btnText" class="transition-transform group-hover:translate-x-1">Start Testing</span>
                    <svg class="w-4 h-4 ml-2 opacity-0 -translate-x-2 transition-all group-hover:opacity-100 group-hover:translate-x-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                    </svg>
                </button>
            </form>
            
            <p class="text-center mt-6 text-stone-500 text-xs">
                Already have an account? 
                <a href="login.html" class="text-orange-500 font-bold hover:underline">Log in</a>
            </p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'foodo-demo';

        let user = null;
        const quotes = [
            "\"People who love to eat are always the best people.\"",
            "\"First we eat, then we do everything else.\"",
            "\"Good food is the foundation of genuine happiness.\"",
            "\"Cooking is like love. It should be entered into with abandonment or not at all.\"",
            "\"Life is uncertain. Eat dessert first.\"",
            "\"Laughter is brightest in the place where food is.\"",
            "\"The only thing I like better than talking about food is eating.\"",
            "\"Tell me what you eat, and I will tell you what you are.\""
        ];

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error("Auth failed", e);
            }
        };
        initAuth();
        onAuthStateChanged(auth, u => { user = u; });

        document.addEventListener('mousemove', e => {
            const spotlight = document.getElementById('spotlight');
            spotlight.style.setProperty('--mouse-x', `${(e.clientX/window.innerWidth)*100}%`);
            spotlight.style.setProperty('--mouse-y', `${(e.clientY/window.innerHeight)*100}%`);
        });

        const form = document.getElementById('signupForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!user) {
                document.getElementById('error-message').innerText = "Connecting to kitchen... please wait.";
                document.getElementById('error-box').classList.remove('hidden');
                return;
            }

            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            btn.disabled = true;
            btnText.innerText = "Plating your account...";

            try {
                const usernameInput = document.getElementById('username').value.trim();
                const fullEmail = usernameInput + "@foodo.com";
                
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', fullEmail), {
                    firstName: document.getElementById('firstname').value,
                    lastName: document.getElementById('lastname').value,
                    username: usernameInput,
                    email: fullEmail,
                    createdAt: new Date().toISOString()
                });

                startCountdown();
            } catch (err) {
                console.error(err);
                document.getElementById('error-message').innerText = "Table reservation failed. Try again.";
                document.getElementById('error-box').classList.remove('hidden');
                btn.disabled = false;
                btnText.innerText = "Start Testing";
            }
        });

        function startCountdown() {
            const formView = document.getElementById('formView');
            const timerView = document.getElementById('timerView');
            const quoteDisplay = document.getElementById('quoteDisplay');
            const numberDisplay = document.getElementById('timerNumber');
            const circle = document.getElementById('timerCircle');
            const container = document.getElementById('mainContainer');

            // Reset circle path
            const circumference = 282.7; // 2 * pi * 45
            circle.style.strokeDasharray = circumference;
            circle.style.strokeDashoffset = "0";

            // Transitions
            formView.style.opacity = '0';
            formView.style.transform = 'translateY(-10px)';
            
            setTimeout(() => {
                formView.classList.add('hidden');
                timerView.classList.remove('hidden');
                
                // Randomize quote
                quoteDisplay.innerText = quotes[Math.floor(Math.random() * quotes.length)];
                
                let timeLeft = 5;
                const totalTime = 5;

                const timerInterval = setInterval(() => {
                    timeLeft--;
                    
                    if (timeLeft >= 0) {
                        numberDisplay.innerText = timeLeft;
                        const offset = ((totalTime - timeLeft) / totalTime) * circumference;
                        circle.style.strokeDashoffset = offset;
                    }

                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        
                        // Final exit transition
                        container.style.transform = 'scale(0.9) translateY(-30px)';
                        container.style.opacity = '0';
                        
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 600);
                    }
                }, 1000);
            }, 500);
        }
    </script>
</body>
</html>
